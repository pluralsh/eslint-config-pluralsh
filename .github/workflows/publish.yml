name: 'Bump & Publish'

on:
  push:
    paths:
      - '*.js'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/publish.yml'
      - '.releaserc'
    branches:
      - 'main'
  pull_request:
    paths:
      - '*.js'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/publish.yml'
      - '.releaserc'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release without publishing'
        type: boolean
        default: true

jobs:
  publish:
    name: 'Bump & Publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      DRY_RUN: ${{ github.event_name == 'pull_request' || inputs.dry_run == true }}

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: 'Setup Node'
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: 'Install Dependencies'
        run: yarn install --immutable
      - name: Verify release credentials
        if: env.DRY_RUN == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PLURAL_BOT_PAT || github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.PLURAL_BOT_NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo 'PLURAL_BOT_NPM_TOKEN is missing'
            exit 1
          fi

          # Prefer PLURAL_BOT_PAT; fall back to the workflow github.token.
          # github.token cannot call /user, so verify against this repository instead.
          gh api "repos/${GITHUB_REPOSITORY}" --jq '"GitHub auth OK for \(.full_name)"'

          # Confirms the npm token can authenticate to the registry.
          # There is no github.token equivalent for npm — rotate PLURAL_BOT_NPM_TOKEN if this fails.
          if ! npm whoami; then
            echo 'PLURAL_BOT_NPM_TOKEN is present but unauthorized. Create a new npm automation/granular token and update the repo secret.'
            exit 1
          fi
      - name: Verify npm package
        if: env.DRY_RUN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PLURAL_BOT_NPM_TOKEN }}
        run: |
          npm pack --dry-run
          npm publish --dry-run
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: ${{ env.DRY_RUN == 'true' }}
          # Analyze the PR/dispatch branch; real publishes still only happen on main.
          branches: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          unset_gha_env: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PLURAL_BOT_PAT || github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.PLURAL_BOT_NPM_TOKEN }}
