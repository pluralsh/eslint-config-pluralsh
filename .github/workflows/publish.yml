name: 'Bump & Publish'

on:
  push:
    paths:
      - '*.js'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/publish.yml'
      - '.releaserc'
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  publish:
    name: 'Bump & Publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # npm trusted publishing (OIDC)

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: 'Setup Node'
        uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: 'Install Dependencies'
        run: yarn install --immutable
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.PLURAL_BOT_PAT || github.token }}
