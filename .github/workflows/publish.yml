name: 'Bump & Publish'

on:
  push:
    paths:
      - '*.js'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/publish.yml'
      - '.releaserc'
    branches:
      - 'main'
  pull_request:
    paths:
      - '*.js'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/publish.yml'
      - '.releaserc'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release without publishing'
        type: boolean
        default: true

jobs:
  publish:
    name: 'Bump & Publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: 'Setup Node'
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: 'Install Dependencies'
        run: yarn install --immutable
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: ${{ github.event_name == 'pull_request' || inputs.dry_run == true }}
          # Analyze the PR/dispatch branch; real publishes still only happen on main.
          branches: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          unset_gha_env: ${{ github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PLURAL_BOT_PAT }}
          NODE_AUTH_TOKEN: ${{ secrets.PLURAL_BOT_NPM_TOKEN }}
